<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/gesture-age-demo/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gesture + Age Demo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #111;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #video {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      transform: scaleX(-1);
    }

    #overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    /* ── Tarjeta de edad/género ── */
    #face-card {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 16px;
      padding: 14px 20px;
      color: #fff;
      min-width: 160px;
      transition: opacity 0.3s;
    }

    #face-card .label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 4px;
    }

    #face-card .value {
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
    }

    #face-card .sub {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.6);
      margin-top: 6px;
    }

    #face-card.hidden {
      opacity: 0;
    }

    /* ── Botones flotantes ── */
    .air-btn {
      position: absolute;
      padding: 20px 36px;
      font-size: 22px;
      font-weight: 600;
      color: #fff;
      background: rgba(255, 255, 255, 0.12);
      border: 2px solid rgba(255, 255, 255, 0.35);
      border-radius: 18px;
      backdrop-filter: blur(12px);
      cursor: none;
      user-select: none;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      transform: translate(-50%, -50%);
    }

    .air-btn.hovered {
      background: rgba(255, 255, 255, 0.25);
      border-color: rgba(255, 255, 255, 0.75);
    }

    .air-btn.fired {
      background: rgba(80, 220, 120, 0.45);
      border-color: rgba(80, 220, 120, 1);
      transform: translate(-50%, -50%) scale(1.06);
    }

    #status {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 14px;
      background: rgba(0, 0, 0, 0.55);
      padding: 8px 20px;
      border-radius: 24px;
      white-space: nowrap;
    }

    #loading-screen {
      position: absolute;
      inset: 0;
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      gap: 16px;
      font-size: 16px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
  <script type="module" crossorigin src="/gesture-age-demo/assets/index-DZCHt1cF.js"></script>
</head>

<body>
  <video id="video" autoplay muted playsinline></video>
  <canvas id="overlay"></canvas>

  <div id="loading-screen">
    <div class="spinner"></div>
    <span id="loading-text">Iniciando cámara...</span>
  </div>

  <!-- Tarjeta edad/género -->
  <div id="face-card" class="hidden">
    <div class="label">Edad estimada</div>
    <div class="value" id="face-age">–</div>
    <div class="sub" id="face-gender">–</div>
  </div>

  <!-- Botones flotantes -->
  <button class="air-btn" id="btn-saludar" style="top:38%; left:30%">👋 Saludar</button>
  <button class="air-btn" id="btn-celebrar" style="top:38%; left:70%">🎉 Celebrar</button>
  <button class="air-btn" id="btn-reset" style="top:68%; left:50%">🔄 Reset</button>

  <div id="status">Cargando...</div>

</body>

</html>
